# TL Home Pro - Run on localhost with PostgreSQL in Docker
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tlhome
      POSTGRES_PASSWORD: tlhome
      POSTGRES_DB: tlhome
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tlhome -d tlhome"]
      interval: 2s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://tlhome:tlhome@postgres:5432/tlhome
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: docker-dev-secret-min-32-characters
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
